<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شال و روسری ۱۱۰ مومنی | فاکتور فروش</title>
    
    <style>
        @font-face {
            font-family: 'Vazirmatn';
            src: url('Vazirmatn-VariableFont_wght.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
        }

        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --glass-blur: blur(20px);
            --bg: #f0f4ff;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --radius: 20px;
            --radius-sm: 14px;
            --radius-xs: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            transition: all var(--transition);
            overflow-x: hidden;
        }

        .bg-particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle { position: absolute; border-radius: 50%; animation: float 20s infinite; opacity: 0.3; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, -50px) scale(1.1); }
            50% { transform: translate(-50px, -100px) scale(0.9); }
            75% { transform: translate(-100px, 50px) scale(1.05); }
        }

        .theme-toggle {
            position: fixed; bottom: 2rem; left: 2rem; width: 52px; height: 52px;
            border-radius: 50%; background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); color: var(--text); font-size: 1.3rem;
            cursor: pointer; z-index: 1000; box-shadow: var(--glass-shadow);
            transition: all var(--transition); display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { transform: scale(1.1) rotate(25deg); box-shadow: 0 8px 32px rgba(99,102,241,0.5); }

        .app { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 6rem; position: relative; z-index: 1; }

        .header { text-align: center; margin-bottom: 3rem; }
        .logo-wrapper { display: inline-block; position: relative; margin-bottom: 1.5rem; }
        .logo-hexagon {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, #6366f1, #a855f7, #f59e0b);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; position: relative; z-index: 2;
            animation: hexPulse 3s ease-in-out infinite;
        }
        @keyframes hexPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.5); }
            50% { box-shadow: 0 0 40px rgba(245,158,11,0.5), 0 0 60px rgba(99,102,241,0.5); }
        }
        .logo-orbits { position: absolute; inset: -30px; z-index: 1; }
        .orbit { position: absolute; inset: 0; border: 2px dashed rgba(99,102,241,0.3); border-radius: 50%; animation: orbitSpin 10s linear infinite; }
        .orbit:nth-child(2) { inset: -15px; animation-duration: 7s; animation-direction: reverse; border-color: rgba(245,158,11,0.3); }
        .orbit:nth-child(3) { inset: -45px; animation-duration: 13s; border-color: rgba(168,85,247,0.3); }
        @keyframes orbitSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .header h1 {
            font-size: 2rem; font-weight: 900;
            background: linear-gradient(135deg, #6366f1, #a855f7, #f59e0b);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradientShift 3s ease-in-out infinite; letter-spacing: -0.5px;
        }
        @keyframes gradientShift { 0%, 100% { background-position: 0% center; } 50% { background-position: 100% center; } }
        .header .subtitle { color: var(--text-secondary); font-size: 0.9rem; font-weight: 400; letter-spacing: 2px; }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: var(--radius);
            box-shadow: var(--glass-shadow); margin-bottom: 1.5rem; overflow: hidden;
            transition: all var(--transition); position: relative;
        }
        .glass-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
        .card-header {
            padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 0.75rem; background: rgba(0,0,0,0.02);
        }
        .card-header-icon {
            width: 44px; height: 44px; border-radius: 14px;
            background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(168,85,247,0.1));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; border: 1px solid rgba(99,102,241,0.2);
        }
        .card-header h2 { font-size: 1.1rem; font-weight: 700; }
        .card-body { padding: 1.5rem; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        .form-span-2 { grid-column: 1 / -1; }
        @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } .app { padding: 1rem 1rem 5rem; } }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-label { font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .badge { font-size: 0.65rem; font-weight: 700; padding: 0.2rem 0.7rem; border-radius: 100px; letter-spacing: 0.5px; }
        .badge-required { background: #fef2f2; color: #ef4444; }
        .badge-optional { background: rgba(0,0,0,0.05); color: var(--text-secondary); }
        .form-input {
            width: 100%; padding: 0.8rem 1rem; border: 2px solid var(--border);
            border-radius: var(--radius-xs); font-family: 'Vazirmatn', sans-serif;
            font-size: 0.9rem; color: var(--text); background: rgba(255,255,255,0.5);
            backdrop-filter: blur(5px); transition: all var(--transition); outline: none;
        }
        [data-theme="dark"] .form-input { background: rgba(0,0,0,0.3); }
        .form-input:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.1), 0 0 20px rgba(99,102,241,0.1); transform: translateY(-1px); }
        .form-input.error { border-color: #ef4444; box-shadow: 0 0 0 4px rgba(239,68,68,0.1); animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
        .error-text { font-size: 0.78rem; color: #ef4444; display: none; font-weight: 500; }

        .radio-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; }
        .radio-card input { display: none; }
        .radio-card label {
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
            padding: 1rem; background: rgba(255,255,255,0.4); backdrop-filter: blur(10px);
            border: 2px solid var(--border); border-radius: var(--radius-sm);
            cursor: pointer; font-weight: 600; font-size: 0.85rem;
            transition: all var(--transition); text-align: center;
        }
        [data-theme="dark"] .radio-card label { background: rgba(0,0,0,0.3); }
        .radio-card label:hover { border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(99,102,241,0.15); }
        .radio-card .radio-icon { font-size: 1.8rem; transition: transform 0.3s; }
        .radio-card input:checked + label {
            border-color: #6366f1; background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(168,85,247,0.1));
            box-shadow: 0 0 20px rgba(99,102,241,0.2); animation: selectedPop 0.3s ease-out;
        }
        .radio-card input:checked + label .radio-icon { transform: scale(1.2); }
        @keyframes selectedPop { 0%{transform:scale(0.95)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }

        .payment-split {
            display: none; background: rgba(255,255,255,0.3); backdrop-filter: blur(10px);
            padding: 1.25rem; border-radius: var(--radius-sm); margin-top: 1rem;
            border: 1px dashed #6366f1; animation: expandIn 0.4s cubic-bezier(0.16,1,0.3,1);
        }
        .payment-split.active { display: block; }
        @keyframes expandIn { from{opacity:0;max-height:0;transform:translateY(-10px)} to{opacity:1;max-height:300px;transform:translateY(0)} }
        .payment-split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 640px) { .payment-split-grid { grid-template-columns: 1fr; } .radio-cards { grid-template-columns: 1fr; } }

        .items-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .item-row {
            display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 0.75rem;
            align-items: start; padding: 1rem; background: rgba(255,255,255,0.4);
            backdrop-filter: blur(5px); border-radius: var(--radius-xs);
            border: 1px solid var(--border); transition: all var(--transition);
            animation: itemSlideIn 0.4s cubic-bezier(0.16,1,0.3,1);
        }
        [data-theme="dark"] .item-row { background: rgba(0,0,0,0.2); }
        @keyframes itemSlideIn { from{opacity:0;transform:translateX(-20px) scale(0.95)} to{opacity:1;transform:translateX(0) scale(1)} }
        .item-row:hover { border-color: #6366f1; box-shadow: 0 4px 20px rgba(99,102,241,0.1); transform: translateX(-3px); }
        @media (max-width: 640px) { .item-row { grid-template-columns: 1fr; } }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-xs);
            font-family: 'Vazirmatn', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all var(--transition); outline: none;
            position: relative; overflow: hidden;
        }
        .btn::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent,rgba(255,255,255,0.3),transparent); transform:translateX(-100%); transition:transform 0.6s; }
        .btn:hover::after { transform:translateX(100%); }
        .btn:active { transform:scale(0.96); }
        .btn-icon { width:38px; height:38px; padding:0; border-radius:var(--radius-xs); font-size:1.1rem; flex-shrink:0; }
        .btn-add { background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(168,85,247,0.1)); color:#6366f1; border:2px dashed #6366f1; width:100%; margin-top:0.75rem; }
        .btn-add:hover { background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(168,85,247,0.2)); border-style:solid; box-shadow:0 4px 15px rgba(99,102,241,0.2); }
        .btn-remove { background:rgba(239,68,68,0.1); color:#ef4444; border:1.5px solid rgba(239,68,68,0.3); }
        .btn-remove:hover { background:rgba(239,68,68,0.2); box-shadow:0 4px 15px rgba(239,68,68,0.2); }
        .btn-primary {
            background:linear-gradient(135deg,#6366f1,#8b5cf6,#6366f1); background-size:200% auto;
            color:white; width:100%; padding:1rem; font-size:1rem; font-weight:800;
            box-shadow:0 8px 30px rgba(99,102,241,0.3); animation:gradientShift 3s ease-in-out infinite; letter-spacing:-0.3px;
        }
        .btn-primary:hover { box-shadow:0 12px 40px rgba(99,102,241,0.5); transform:translateY(-3px); }
        
        .btn-secondary-action {
            background: var(--surface); color: var(--text); border: 2px solid var(--border);
            width: 100%; padding: 0.9rem; font-size: 0.95rem; font-weight: 700;
            margin-top: 0.75rem;
        }
        .btn-secondary-action:hover { border-color: #6366f1; background: var(--surface-hover); }

        .total-bar {
            display:flex; justify-content:space-between; align-items:center;
            padding:1.25rem 1.5rem; background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(245,158,11,0.08));
            border-top:1px solid var(--border);
        }
        .total-label { font-weight:700; font-size:1rem; }
        .total-value { font-size:1.8rem; font-weight:900; background:linear-gradient(135deg,#6366f1,#f59e0b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:gradientShift 3s ease-in-out infinite; background-size:200% auto; }
        .total-currency { font-size:0.85rem; font-weight:500; color:var(--text-secondary); margin-right:0.3rem; }

        /* ==================== */
        /* LOG / HISTORY STYLES */
        /* ==================== */
        .log-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            z-index: 3000; display: none; align-items: center; justify-content: center; padding: 1rem;
        }
        .log-overlay.active { display: flex; animation: fadeIn 0.3s ease-out; }
        .log-modal {
            background: var(--surface); color: var(--text); border-radius: var(--radius);
            max-width: 900px; width: 100%; max-height: 85vh; overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4); display: flex; flex-direction: column;
            animation: modalIn 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .log-modal-header {
            padding: 1.5rem 2rem; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-secondary);
        }
        .log-modal-header h2 { font-size: 1.3rem; font-weight: 800; }
        .log-modal-close {
            width: 40px; height: 40px; border-radius: 50%; background: var(--surface);
            border: 2px solid var(--border); font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
        }
        .log-modal-close:hover { background: #ef4444; color: white; border-color: #ef4444; transform: rotate(90deg); }
        .log-modal-body { padding: 1.5rem 2rem; overflow-y: auto; flex: 1; }
        
        .log-empty { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .log-empty-icon { font-size: 4rem; margin-bottom: 1rem; }
        
        .log-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .log-item {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 1rem 1.25rem;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s; cursor: pointer;
        }
        .log-item:hover { border-color: #6366f1; box-shadow: 0 4px 15px rgba(99,102,241,0.1); transform: translateX(-3px); }
        .log-item-info { flex: 1; }
        .log-item-id { font-weight: 800; color: #6366f1; font-size: 0.9rem; }
        .log-item-customer { font-size: 0.85rem; color: var(--text); margin-top: 0.25rem; }
        .log-item-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.15rem; }
        .log-item-amount { font-weight: 900; font-size: 1.1rem; color: var(--accent); text-align: left; }
        .log-item-actions { display: flex; gap: 0.5rem; margin-right: 1rem; }
        .log-btn-sm {
            padding: 0.4rem 0.8rem; font-size: 0.75rem; border-radius: var(--radius-xs);
            cursor: pointer; font-family: 'Vazirmatn', sans-serif; font-weight: 600;
            border: none; transition: all 0.2s;
        }
        .log-btn-view { background: #6366f1; color: white; }
        .log-btn-view:hover { background: #4f46e5; }
        .log-btn-print { background: #000; color: white; }
        .log-btn-print:hover { background: #333; }
        .log-btn-delete { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
        .log-btn-delete:hover { background: #ef4444; color: white; }
        
        .log-footer { padding: 1rem 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); }
        .log-count { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; }
        .btn-clear-log { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; padding: 0.5rem 1rem; border-radius: var(--radius-xs); cursor: pointer; font-family: 'Vazirmatn', sans-serif; font-weight: 700; font-size: 0.8rem; transition: all 0.2s; }
        .btn-clear-log:hover { background: #ef4444; color: white; }

        /* ==================== */
        /* INVOICE MODAL */
        /* ==================== */
        .invoice-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(20px);
            z-index:2000; display:none; align-items:center; justify-content:center; padding:1rem;
        }
        .invoice-overlay.active { display:flex; animation:fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .invoice-modal {
            background:#ffffff; color:#000000; border-radius:4px; max-width:850px; width:100%;
            max-height:90vh; overflow-y:auto; box-shadow:0 40px 80px rgba(0,0,0,0.4);
            animation:modalIn 0.5s cubic-bezier(0.16,1,0.3,1); position:relative;
        }
        @keyframes modalIn { from{opacity:0;transform:translateY(40px) scale(0.92)} to{opacity:1;transform:translateY(0) scale(1)} }
        .invoice-modal-content { padding:2.5rem; }
        .invoice-close-btn {
            position:absolute; top:1rem; left:1rem; width:40px; height:40px; border-radius:50%;
            background:#f1f5f9; border:2px solid #e2e8f0; font-size:1.1rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center; transition:all 0.3s; z-index:10; color:#0f172a;
        }
        .invoice-close-btn:hover { background:#0f172a; color:white; border-color:#0f172a; transform:rotate(90deg); }

        .inv-top-bar { height:4px; background:#000; margin-bottom:2rem; }
        .inv-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2rem; }
        .inv-shop-name { font-size:2rem; font-weight:900; letter-spacing:-0.5px; line-height:1.2; }
        .inv-shop-name .g { color:#d97706; } .inv-shop-name .p { color:#7c3aed; }
        .inv-tag { display:inline-block; background:#000; color:#fff; padding:0.3rem 1.2rem; font-weight:700; font-size:0.75rem; letter-spacing:1px; margin-top:0.5rem; }
        .inv-num-box { background:#000; color:#fff; padding:1rem 1.5rem; text-align:left; min-width:200px; }
        .inv-num-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:2px; opacity:0.7; }
        .inv-num { font-size:1.4rem; font-weight:900; } .inv-dt { font-size:0.75rem; opacity:0.7; margin-top:0.25rem; }
        .inv-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:2rem; }
        @media(max-width:640px){ .inv-info-grid{grid-template-columns:1fr} }
        .inv-info-box { border:2px solid #000; padding:1.25rem; }
        .inv-info-box h3 { font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:0.75rem; font-weight:900; border-bottom:2px solid #000; padding-bottom:0.5rem; }
        .inv-info-box p { margin:0.4rem 0; font-size:0.85rem; font-weight:500; }
        .inv-info-box .lbl { font-weight:700; }
        .inv-table-wrap { border:2px solid #000; margin-bottom:2rem; overflow:hidden; }
        .inv-table { width:100%; border-collapse:collapse; }
        .inv-table thead { background:#000; }
        .inv-table th { padding:0.75rem 1rem; text-align:right; font-size:0.7rem; font-weight:800; color:#fff; text-transform:uppercase; letter-spacing:1px; }
        .inv-table td { padding:0.75rem 1rem; border-bottom:2px solid #000; font-size:0.85rem; font-weight:500; }
        .inv-table tbody tr:last-child td { border-bottom:none; }
        .inv-total-section { border:2px solid #000; padding:1.5rem; display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; background:#fafafa; }
        .inv-total-label { font-size:1rem; font-weight:900; text-transform:uppercase; letter-spacing:1px; }
        .inv-total-amount { font-size:2rem; font-weight:900; letter-spacing:-0.5px; }
        .inv-total-currency { font-size:0.9rem; font-weight:700; }
        .inv-payment-info { border:2px solid #000; padding:1.25rem; margin-bottom:1.5rem; }
        .inv-payment-info h3 { font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:0.75rem; font-weight:900; border-bottom:2px solid #000; padding-bottom:0.5rem; }
        .inv-payment-info p { margin:0.4rem 0; font-size:0.85rem; font-weight:500; }
        .inv-footer { text-align:center; margin-top:2rem; padding-top:1.5rem; border-top:3px solid #000; }
        .inv-footer-text { font-size:0.85rem; line-height:1.8; font-weight:500; color:#333; }
        .inv-stamp { display:inline-block; border:3px solid #000; padding:0.5rem 1.5rem; font-weight:900; font-size:1rem; margin-top:1rem; letter-spacing:1px; }
        .btn-print-inv {
            background:#000; color:#fff; border:2px solid #000; width:100%; padding:0.9rem;
            font-size:0.95rem; font-weight:800; margin-top:1.5rem; cursor:pointer;
            font-family:'Vazirmatn',sans-serif; letter-spacing:1px; transition:all 0.3s;
        }
        .btn-print-inv:hover { background:#fff; color:#000; }

        /* PRINT */
        @media print {
            @page { size: A4; margin: 12mm 15mm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; font-family: 'Vazirmatn', Tahoma, sans-serif !important; }
            .app, .theme-toggle, .invoice-overlay, .no-print, .invoice-close-btn, .btn-print-inv, .bg-particles, .inv-top-bar, .log-overlay { display: none !important; }
            .print-only { display: block !important; background: white !important; color: #000 !important; padding: 0 !important; }
            .print-invoice { font-family: 'Vazirmatn', Tahoma, sans-serif !important; color: #000 !important; background: white !important; }
            .print-header { display: flex !important; justify-content: space-between !important; align-items: flex-start !important; border-bottom: 3px solid #000 !important; padding-bottom: 20px !important; margin-bottom: 25px !important; }
            .print-header-left h1 { font-size: 24pt !important; font-weight: 900 !important; color: #000 !important; margin: 0 !important; letter-spacing: -0.5px !important; }
            .print-header-left .print-subtitle { font-size: 9pt !important; color: #333 !important; margin-top: 4px !important; font-weight: 500 !important; letter-spacing: 2px !important; }
            .print-header-right { text-align: left !important; border: 2px solid #000 !important; padding: 10px 18px !important; }
            .print-header-right .print-label { font-size: 7pt !important; text-transform: uppercase !important; letter-spacing: 2px !important; color: #333 !important; font-weight: 700 !important; }
            .print-header-right .print-invoice-number { font-size: 14pt !important; font-weight: 900 !important; color: #000 !important; margin-top: 2px !important; }
            .print-header-right .print-date { font-size: 8pt !important; color: #555 !important; margin-top: 3px !important; }
            .print-info-row { display: flex !important; gap: 20px !important; margin-bottom: 25px !important; }
            .print-info-col { flex: 1 !important; border: 2px solid #000 !important; padding: 15px !important; }
            .print-info-col h3 { font-size: 8pt !important; text-transform: uppercase !important; letter-spacing: 3px !important; font-weight: 900 !important; color: #000 !important; margin-bottom: 10px !important; padding-bottom: 8px !important; border-bottom: 2px solid #000 !important; }
            .print-info-col p { font-size: 9pt !important; margin: 5px 0 !important; color: #000 !important; font-weight: 500 !important; line-height: 1.6 !important; }
            .print-info-col .print-info-label { font-weight: 700 !important; color: #000 !important; }
            .print-table-wrapper { border: 2px solid #000 !important; margin-bottom: 25px !important; }
            .print-table { width: 100% !important; border-collapse: collapse !important; }
            .print-table thead { background: #000 !important; }
            .print-table th { padding: 10px 12px !important; text-align: right !important; font-size: 8pt !important; font-weight: 800 !important; color: #fff !important; text-transform: uppercase !important; letter-spacing: 2px !important; border-bottom: 2px solid #000 !important; }
            .print-table td { padding: 10px 12px !important; border-bottom: 1.5px solid #000 !important; font-size: 9pt !important; color: #000 !important; font-weight: 500 !important; }
            .print-table tbody tr:last-child td { border-bottom: 2px solid #000 !important; }
            .print-total-section { border: 2px solid #000 !important; padding: 18px 20px !important; display: flex !important; justify-content: space-between !important; align-items: center !important; margin-bottom: 20px !important; background: #f8f8f8 !important; }
            .print-total-label { font-size: 11pt !important; font-weight: 900 !important; text-transform: uppercase !important; letter-spacing: 2px !important; color: #000 !important; }
            .print-total-amount { font-size: 22pt !important; font-weight: 900 !important; color: #000 !important; letter-spacing: -1px !important; }
            .print-total-currency { font-size: 10pt !important; font-weight: 700 !important; color: #000 !important; }
            .print-payment-info { border: 2px solid #000 !important; padding: 15px !important; margin-bottom: 20px !important; }
            .print-payment-info h3 { font-size: 8pt !important; text-transform: uppercase !important; letter-spacing: 3px !important; font-weight: 900 !important; color: #000 !important; margin-bottom: 10px !important; padding-bottom: 8px !important; border-bottom: 2px solid #000 !important; }
            .print-payment-info p { font-size: 9pt !important; margin: 5px 0 !important; color: #000 !important; font-weight: 500 !important; line-height: 1.6 !important; }
            .print-payment-info .print-info-label { font-weight: 700 !important; }
            .print-footer { text-align: center !important; margin-top: 25px !important; padding-top: 20px !important; border-top: 3px solid #000 !important; }
            .print-footer-text { font-size: 9pt !important; color: #000 !important; line-height: 2 !important; font-weight: 500 !important; }
            .print-stamp { display: inline-block !important; border: 3px solid #000 !important; padding: 6px 20px !important; font-weight: 900 !important; font-size: 10pt !important; margin-top: 12px !important; letter-spacing: 2px !important; color: #000 !important; }
            .print-divider { border: none !important; border-top: 1px solid #ccc !important; margin: 15px 0 !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>

    <button class="theme-toggle no-print" onclick="toggleTheme()" id="themeToggle" title="تغییر تم">🌙</button>
    <div class="invoice-overlay" id="invoiceOverlay">
        <div class="invoice-modal">
            <button class="invoice-close-btn no-print" onclick="closeInvoice()">✕</button>
            <div class="inv-top-bar"></div>
            <div class="invoice-modal-content" id="invoiceModalContent"></div>
        </div>
    </div>

    <div class="log-overlay" id="logOverlay">
        <div class="log-modal">
            <div class="log-modal-header">
                <h2>📋 تاریخچه فاکتورها</h2>
                <button class="log-modal-close" onclick="closeLog()">✕</button>
            </div>
            <div class="log-modal-body" id="logModalBody">
            </div>
            <div class="log-footer">
                <span class="log-count" id="logCount">۰ فاکتور ثبت شده</span>
                <button class="btn-clear-log" onclick="clearAllLogs()">🗑️ حذف همه</button>
            </div>
        </div>
    </div>
    <div class="app">
        <div class="header no-print">
            <div class="logo-wrapper">
                <div class="logo-orbits"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div>
                <div class="logo-hexagon">🧣</div>
            </div>
            <h1>شال و روسری ۱۱۰ مومنی</h1>
            <p class="subtitle">✦ سامانه ثبت و چاپ فاکتور فروش ✦</p>
        </div>

        <div class="glass-card no-print">
            <div class="card-header"><div class="card-header-icon">👤</div><h2>اطلاعات مشتری</h2></div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">نام و نام خانوادگی <span class="badge badge-required">اجباری</span></label>
                        <input type="text" class="form-input" id="customerName" placeholder="نام کامل مشتری">
                        <span class="error-text" id="customerNameError">لطفاً نام مشتری را وارد کنید</span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">شماره تماس <span class="badge badge-required">اجباری</span></label>
                        <input type="tel" class="form-input" id="customerPhone" placeholder="۰۹۱۲۳۴۵۶۷۸۹" maxlength="11">
                        <span class="error-text" id="customerPhoneError">شماره تماس باید ۱۱ رقم و با صفر شروع شود</span>
                    </div>
                    <div class="form-group form-span-2">
                        <label class="form-label">آدرس <span class="badge badge-optional">اختیاری</span></label>
                        <input type="text" class="form-input" id="customerAddress" placeholder="آدرس کامل مشتری">
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card no-print">
            <div class="card-header"><div class="card-header-icon">🚚</div><h2>روش ارسال</h2></div>
            <div class="card-body">
                <div class="radio-cards">
                    <div class="radio-card"><input type="radio" id="shippingTipax" name="shipping" value="تیپاکس" checked><label for="shippingTipax"><span class="radio-icon">📦</span><span>تیپاکس</span></label></div>
                    <div class="radio-card"><input type="radio" id="shippingChaparr" name="shipping" value="چاپار"><label for="shippingChaparr"><span class="radio-icon">✉️</span><span>چاپار</span></label></div>
                </div>
            </div>
        </div>

        <div class="glass-card no-print">
            <div class="card-header"><div class="card-header-icon">💳</div><h2>روش پرداخت</h2></div>
            <div class="card-body">
                <div class="radio-cards">
                    <div class="radio-card"><input type="radio" id="paymentCash" name="payment" value="نقدی" checked><label for="paymentCash"><span class="radio-icon">💵</span><span>نقدی</span></label></div>
                    <div class="radio-card"><input type="radio" id="paymentCheck" name="payment" value="چکی"><label for="paymentCheck"><span class="radio-icon">📝</span><span>چکی</span></label></div>
                    <div class="radio-card"><input type="radio" id="paymentMixed" name="payment" value="نقدی + چکی"><label for="paymentMixed"><span class="radio-icon">💵📝</span><span>نقدی + چکی</span></label></div>
                </div>
                <div class="payment-split" id="paymentSplit">
                    <div class="payment-split-grid">
                        <div class="form-group"><label class="form-label">💵 مبلغ نقدی (تومان)</label><input type="number" class="form-input" id="cashAmount" placeholder="مبلغ نقدی"></div>
                        <div class="form-group"><label class="form-label">📝 مبلغ چکی (تومان)</label><input type="number" class="form-input" id="checkAmount" placeholder="مبلغ چکی"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card no-print">
            <div class="card-header"><div class="card-header-icon">🛍️</div><h2>محصولات</h2></div>
            <div class="card-body">
                <div class="items-list" id="itemsContainer"></div>
                <button class="btn btn-add" onclick="addItem()">＋ افزودن محصول جدید</button>
            </div>
            <div class="total-bar">
                <span class="total-label">💰 مبلغ قابل پرداخت</span>
                <div><span class="total-value" id="totalPrice">۰</span><span class="total-currency">تومان</span></div>
            </div>
        </div>

        <div class="no-print">
            <button class="btn btn-primary" onclick="generateInvoice()">✨ ثبت فاکتور جدید</button>
            <button class="btn btn-secondary-action" onclick="openLog()">📋 مشاهده تاریخچه فاکتورها</button>
        </div>
    </div>
    <div class="print-only" id="printSection"></div>

    <script>
        (function(){const c=document.getElementById('bgParticles');const cl=['#6366f1','#a855f7','#f59e0b','#ec4899'];for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.cssText=`width:${Math.random()*8+2}px;height:${Math.random()*8+2}px;background:${cl[Math.floor(Math.random()*cl.length)]};top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*20}s;animation-duration:${Math.random()*20+15}s;opacity:${Math.random()*0.15};`;c.appendChild(p);}})();

        function toggleTheme(){const h=document.documentElement;const n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('theme',n);document.getElementById('themeToggle').textContent=n==='dark'?'☀️':'🌙';}
        (function(){const s=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',s);document.getElementById('themeToggle').textContent=s==='dark'?'☀️':'🌙';})();

        document.querySelectorAll('input[name="payment"]').forEach(r=>{r.addEventListener('change',function(){document.getElementById('paymentSplit').classList.toggle('active',this.value==='نقدی + چکی');});});

        function getShipping(){return document.querySelector('input[name="shipping"]:checked')?.value||'تیپاکس';}
        function getPayment(){return document.querySelector('input[name="payment"]:checked')?.value||'نقدی';}

        let itemCount=0;
        window.onload=()=>addItem();
        function addItem(){itemCount++;const c=document.getElementById('itemsContainer');const r=document.createElement('div');r.className='item-row';r.id=`item-${itemCount}`;r.innerHTML=`<div class="form-group"><label class="form-label">🏷️ نام محصول</label><input type="text" class="form-input product-name" placeholder="مثلاً: روسری ابریشم"></div><div class="form-group"><label class="form-label">💵 قیمت (تومان)</label><input type="number" class="form-input product-price" placeholder="۰" oninput="calcTotal()"></div><div class="form-group"><label class="form-label">📦 تعداد</label><input type="number" class="form-input product-quantity" value="1" min="1" oninput="calcTotal()"></div>${itemCount>1?`<button class="btn btn-icon btn-remove" onclick="removeItem(${itemCount})">✕</button>`:'<div></div>'}`;c.appendChild(r);calcTotal();}
        function removeItem(id){const e=document.getElementById(`item-${id}`);if(e){e.style.opacity='0';e.style.transform='translateX(20px)';setTimeout(()=>{e.remove();calcTotal();},300);}}
        function calcTotal(){let t=0;document.querySelectorAll('.product-price').forEach((p,i)=>{t+=(parseFloat(p.value)||0)*(parseInt(document.querySelectorAll('.product-quantity')[i].value)||0);});document.getElementById('totalPrice').textContent=t.toLocaleString('fa-IR');}

        function validate(){
            let v=true;
            const n=document.getElementById('customerName'),p=document.getElementById('customerPhone');
            if(!n.value.trim()){n.classList.add('error');document.getElementById('customerNameError').style.display='block';v=false;}
            else{n.classList.remove('error');document.getElementById('customerNameError').style.display='none';}
            const phoneValue=p.value.trim();
            const phoneRegex=/^0\d{10}$/;
            if(!phoneRegex.test(phoneValue)){p.classList.add('error');document.getElementById('customerPhoneError').textContent='شماره تماس باید ۱۱ رقم و با صفر شروع شود';document.getElementById('customerPhoneError').style.display='block';v=false;}
            else{p.classList.remove('error');document.getElementById('customerPhoneError').style.display='none';}
            if(getPayment()==='نقدی + چکی'){const ca=document.getElementById('cashAmount'),ck=document.getElementById('checkAmount');if(!ca.value||parseFloat(ca.value)<=0||!ck.value||parseFloat(ck.value)<=0){alert('لطفاً مبالغ نقدی و چکی را وارد کنید');v=false;}}
            return v;
        }
        function getLogs(){return JSON.parse(localStorage.getItem('invoiceLogs')||'[]');}
        function saveLogs(logs){localStorage.setItem('invoiceLogs',JSON.stringify(logs));}
        
        function addLog(invoiceData){
            const logs=getLogs();
            logs.unshift({...invoiceData,timestamp:new Date().toISOString()});
            saveLogs(logs);
        }

        function deleteLog(index){
            if(confirm('آیا از حذف این فاکتور اطمینان دارید؟')){
                const logs=getLogs();
                logs.splice(index,1);
                saveLogs(logs);
                openLog();
            }
        }

        function clearAllLogs(){
            if(confirm('آیا از حذف تمام فاکتورها اطمینان دارید؟ این عملیات قابل بازگشت نیست!')){
                saveLogs([]);
                openLog();
            }
        }

        function openLog(){
            const logs=getLogs();
            const body=document.getElementById('logModalBody');
            const count=document.getElementById('logCount');
            
            count.textContent=`${logs.length} فاکتور ثبت شده`;
            
            if(logs.length===0){
                body.innerHTML=`<div class="log-empty"><div class="log-empty-icon">📭</div><p>هنوز هیچ فاکتوری ثبت نشده است</p></div>`;
            } else {
                body.innerHTML=`<div class="log-list">${logs.map((log,i)=>`
                    <div class="log-item">
                        <div class="log-item-info">
                            <div class="log-item-id">🧾 ${log.invoiceNumber}</div>
                            <div class="log-item-customer">👤 ${log.customerName} - 📱 ${log.customerPhone}</div>
                            <div class="log-item-meta">📅 ${log.date} | 🚚 ${log.shipping} | 💳 ${log.paymentMethod} | 🛍️ ${log.itemCount} قلم</div>
                        </div>
                        <div class="log-item-amount">${log.grandTotal.toLocaleString('fa-IR')} تومان</div>
                        <div class="log-item-actions">
                            <button class="log-btn-sm log-btn-view" onclick="viewLogInvoice(${i})">👁️ مشاهده</button>
                            <button class="log-btn-sm log-btn-print" onclick="printLogInvoice(${i})">🖨️ چاپ</button>
                            <button class="log-btn-sm log-btn-delete" onclick="deleteLog(${i})">🗑️</button>
                        </div>
                    </div>
                `).join('')}</div>`;
            }
            
            document.getElementById('logOverlay').classList.add('active');
        }

        function closeLog(){document.getElementById('logOverlay').classList.remove('active');}
        document.getElementById('logOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLog();});

        function viewLogInvoice(index){
            const log=getLogs()[index];
            if(log){
                document.getElementById('printSection').innerHTML=log.printHTML;
                document.getElementById('invoiceModalContent').innerHTML=log.modalHTML;
                document.getElementById('invoiceOverlay').classList.add('active');
                closeLog();
                setTimeout(()=>{
                    if(!document.getElementById('modalPrintBtn')){
                        const pb=document.createElement('button');
                        pb.id='modalPrintBtn';pb.className='btn-print-inv no-print';
                        pb.innerHTML='چاپ فاکتور';
                        pb.onclick=()=>{document.getElementById('printSection').innerHTML=log.printHTML;window.print();};
                        document.getElementById('invoiceModalContent').appendChild(pb);
                    }
                },100);
            }
        }

        function printLogInvoice(index){
            const log=getLogs()[index];
            if(log){
                document.getElementById('printSection').innerHTML=log.printHTML;
                closeLog();
                setTimeout(()=>window.print(),300);
            }
        }

        function generateInvoice(){
            if(!validate()){alert('لطفاً فیلدهای اجباری را تکمیل کنید');return;}
            const cn=document.getElementById('customerName').value;
            const cp=document.getElementById('customerPhone').value;
            const ca=document.getElementById('customerAddress').value;
            const sh=getShipping();
            const pm=getPayment();
            const inv='INV-'+new Date().toLocaleDateString('fa-IR').replace(/[\/]/g,'')+'-'+Math.floor(Math.random()*9000+1000);
            const now=new Date();
            const ds=now.toLocaleDateString('fa-IR',{year:'numeric',month:'long',day:'numeric'});
            const ts=now.toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'});

            let th='',gt=0,rn=0;
            document.querySelectorAll('.product-name').forEach((n,i)=>{
                const nm=n.value.trim(),pr=parseFloat(document.querySelectorAll('.product-price')[i].value)||0,qt=parseInt(document.querySelectorAll('.product-quantity')[i].value)||0;
                if(nm&&pr>0&&qt>0){rn++;const it=pr*qt;gt+=it;th+=`<tr><td>${rn.toLocaleString('fa-IR')}</td><td>${nm}</td><td>${pr.toLocaleString('fa-IR')} تومان</td><td>${qt.toLocaleString('fa-IR')}</td><td><strong>${it.toLocaleString('fa-IR')} تومان</strong></td></tr>`;}
            });

            let pi='';
            if(pm==='نقدی + چکی'){const cam=parseFloat(document.getElementById('cashAmount').value)||0,chm=parseFloat(document.getElementById('checkAmount').value)||0;pi=`<p><span class="lbl">روش پرداخت:</span> <strong>نقدی و چکی (ترکیبی)</strong></p><p><span class="lbl">مبلغ نقدی:</span> <strong>${cam.toLocaleString('fa-IR')} تومان</strong></p><p><span class="lbl">مبلغ چکی:</span> <strong>${chm.toLocaleString('fa-IR')} تومان</strong></p><p><span class="lbl">جمع پرداختی:</span> <strong>${(cam+chm).toLocaleString('fa-IR')} تومان</strong></p>`;}
            else if(pm==='نقدی'){pi=`<p><span class="lbl">روش پرداخت:</span> <strong>نقدی</strong></p><p><span class="lbl">مبلغ پرداختی:</span> <strong>${gt.toLocaleString('fa-IR')} تومان</strong></p>`;}
            else{pi=`<p><span class="lbl">روش پرداخت:</span> <strong>چکی</strong></p><p><span class="lbl">مبلغ چک:</span> <strong>${gt.toLocaleString('fa-IR')} تومان</strong></p>`;}

            const modalHTML=`
                <div class="inv-header">
                    <div><div class="inv-shop-name"><span class="g">شال و روسری</span> <span class="p">۱۱۰ مومنی</span></div><div class="inv-tag">فروشگاه انواع شال و روسری</div></div>
                    <div class="inv-num-box"><div class="inv-num-label">شماره فاکتور</div><div class="inv-num">${inv}</div><div class="inv-dt">${ds} - ${ts}</div></div>
                </div>
                <div class="inv-info-grid">
                    <div class="inv-info-box"><h3>اطلاعات مشتری</h3><p><span class="lbl">نام:</span> <strong>${cn}</strong></p><p><span class="lbl">شماره تماس:</span> <strong>${cp}</strong></p>${ca?`<p><span class="lbl">آدرس:</span> ${ca}</p>`:''}</div>
                    <div class="inv-info-box"><h3>اطلاعات سفارش</h3><p><span class="lbl">روش ارسال:</span> <strong>${sh==='تیپاکس'?'تیپاکس':'چاپار'}</strong></p><p><span class="lbl">تعداد اقلام:</span> <strong>${rn.toLocaleString('fa-IR')} عدد</strong></p><p><span class="lbl">تاریخ:</span> <strong>${ds}</strong></p></div>
                </div>
                <div class="inv-table-wrap"><table class="inv-table"><thead><tr><th>ردیف</th><th>نام محصول</th><th>قیمت واحد</th><th>تعداد</th><th>قیمت کل</th></tr></thead><tbody>${th||'<tr><td colspan="5" style="text-align:center;padding:2rem;">محصولی ثبت نشده</td></tr>'}</tbody></table></div>
                <div class="inv-total-section"><span class="inv-total-label">مبلغ قابل پرداخت</span><div><span class="inv-total-amount">${gt.toLocaleString('fa-IR')}</span> <span class="inv-total-currency">تومان</span></div></div>
                <div class="inv-payment-info"><h3>اطلاعات پرداخت</h3>${pi}</div>
                <div class="inv-footer"><div class="inv-footer-text">با تشکر از اعتماد شما به <strong>شال و روسری ۱۱۰ مومنی</strong><br>منتظر دیدار مجدد شما هستیم</div><div class="inv-stamp">پرداخت شد</div></div>
            `;

            const printPI=pm==='نقدی + چکی'?`<p><span class="print-info-label">روش پرداخت:</span> <strong>نقدی و چکی (ترکیبی)</strong></p><p><span class="print-info-label">مبلغ نقدی:</span> <strong>${(parseFloat(document.getElementById('cashAmount').value)||0).toLocaleString('fa-IR')} تومان</strong></p><p><span class="print-info-label">مبلغ چکی:</span> <strong>${(parseFloat(document.getElementById('checkAmount').value)||0).toLocaleString('fa-IR')} تومان</strong></p><p><span class="print-info-label">جمع پرداختی:</span> <strong>${((parseFloat(document.getElementById('cashAmount').value)||0)+(parseFloat(document.getElementById('checkAmount').value)||0)).toLocaleString('fa-IR')} تومان</strong></p>`:pm==='نقدی'?`<p><span class="print-info-label">روش پرداخت:</span> <strong>نقدی</strong></p><p><span class="print-info-label">مبلغ پرداختی:</span> <strong>${gt.toLocaleString('fa-IR')} تومان</strong></p>`:`<p><span class="print-info-label">روش پرداخت:</span> <strong>چکی</strong></p><p><span class="print-info-label">مبلغ چک:</span> <strong>${gt.toLocaleString('fa-IR')} تومان</strong></p>`;

            const printHTML=`
                <div class="print-invoice">
                    <div class="print-header"><div class="print-header-left"><h1>شال و روسری ۱۱۰ مومنی</h1><div class="print-subtitle">فروشگاه انواع شال و روسری</div></div><div class="print-header-right"><div class="print-label">شماره فاکتور</div><div class="print-invoice-number">${inv}</div><div class="print-date">${ds} - ${ts}</div></div></div>
                    <div class="print-info-row"><div class="print-info-col"><h3>اطلاعات مشتری</h3><p><span class="print-info-label">نام:</span> <strong>${cn}</strong></p><p><span class="print-info-label">شماره تماس:</span> <strong>${cp}</strong></p>${ca?`<p><span class="print-info-label">آدرس:</span> ${ca}</p>`:''}</div><div class="print-info-col"><h3>اطلاعات سفارش</h3><p><span class="print-info-label">روش ارسال:</span> <strong>${sh==='تیپاکس'?'تیپاکس':'چاپار'}</strong></p><p><span class="print-info-label">تعداد اقلام:</span> <strong>${rn.toLocaleString('fa-IR')} عدد</strong></p><p><span class="print-info-label">تاریخ:</span> <strong>${ds}</strong></p></div></div>
                    <div class="print-table-wrapper"><table class="print-table"><thead><tr><th>ردیف</th><th>نام محصول</th><th>قیمت واحد</th><th>تعداد</th><th>قیمت کل</th></tr></thead><tbody>${th||'<tr><td colspan="5" style="text-align:center;padding:20px;">محصولی ثبت نشده</td></tr>'}</tbody></table></div>
                    <div class="print-total-section"><span class="print-total-label">مبلغ قابل پرداخت</span><div><span class="print-total-amount">${gt.toLocaleString('fa-IR')}</span> <span class="print-total-currency">تومان</span></div></div>
                    <div class="print-payment-info"><h3>اطلاعات پرداخت</h3>${printPI}</div>
                    <div class="print-footer"><div class="print-footer-text">با تشکر از اعتماد شما به <strong>شال و روسری ۱۱۰ مومنی</strong><br>منتظر دیدار مجدد شما هستیم</div><div class="print-stamp">پرداخت شد</div></div>
                </div>
            `;

            addLog({
                invoiceNumber:inv, customerName:cn, customerPhone:cp, customerAddress:ca,
                shipping:sh, paymentMethod:pm, itemCount:rn, grandTotal:gt,
                date:`${ds} - ${ts}`, modalHTML, printHTML,
                cashAmount:pm==='نقدی + چکی'?parseFloat(document.getElementById('cashAmount').value)||0:null,
                checkAmount:pm==='نقدی + چکی'?parseFloat(document.getElementById('checkAmount').value)||0:null
            });

            document.getElementById('invoiceModalContent').innerHTML=modalHTML;
            document.getElementById('invoiceOverlay').classList.add('active');
            document.getElementById('printSection').innerHTML=printHTML;

            setTimeout(()=>{
                if(!document.getElementById('modalPrintBtn')){
                    const pb=document.createElement('button');
                    pb.id='modalPrintBtn';pb.className='btn-print-inv no-print';
                    pb.innerHTML='چاپ فاکتور';
                    pb.onclick=()=>{document.getElementById('printSection').innerHTML=printHTML;window.print();};
                    document.getElementById('invoiceModalContent').appendChild(pb);
                }
            },100);

            document.getElementById('customerName').value='';
            document.getElementById('customerPhone').value='';
            document.getElementById('customerAddress').value='';
            document.getElementById('itemsContainer').innerHTML='';
            itemCount=0;
            addItem();
            calcTotal();
            document.getElementById('paymentSplit').classList.remove('active');
            document.getElementById('paymentCash').checked=true;
            document.getElementById('shippingTipax').checked=true;
        }

        function closeInvoice(){document.getElementById('invoiceOverlay').classList.remove('active');}
        document.getElementById('invoiceOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeInvoice();});
        document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeInvoice();closeLog();}});
    </script>
</body>
</html>
